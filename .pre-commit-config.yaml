repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        exclude: ^images/
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake

  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.1
    hooks:
      - id: pyupgrade
        args: [--py313-plus]

  - repo: https://github.com/MarcoGorelli/absolufy-imports
    rev: v0.3.1
    hooks:
      - id: absolufy-imports

  - repo: local
    hooks:
      - id: forbid-credential-files
        name: forbid credential files
        entry: python scripts/check_forbidden_credential_files.py
        language: python
        pass_filenames: true
        files: '(^|/)(\.env($|\..+)|\.pypirc|\.npmrc)$'
        exclude: '(^|/)\.env\.example$'
      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        # Don't run pylint on generated Django migration files; they
        # frequently contain stylistic issues and are safe to skip in
        # pre-commit checks. We keep broader ignore rules in
        # `pyproject.toml`, but pre-commit hands explicit filenames to
        # hooks which bypasses project-level ignore patterns — this
        # per-hook exclude ensures migrations (and now tests) are not linted here.
        exclude: '^((.*/)?migrations/.*|tests/.*)'

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs[compatible-mypy]
          - psycopg[binary]>=3.2.12

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [--configfile, pyproject.toml]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: '(^|/)(landing|web)/package-lock\.json$|(^|/)\.secrets\.baseline$'
